services:
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: infra/web.Dockerfile
    env_file:
      - .env
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
