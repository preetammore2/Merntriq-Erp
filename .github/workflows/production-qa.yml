name: Production QA

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_USE_SQLITE: "True"
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: "False"
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL || vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8000/api/v1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Django checks and migrations
        working-directory: backend
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput

      - name: Backend tests
        working-directory: backend
        run: python manage.py test apps.accounts apps.core --verbosity 1

      - name: API connection integration tests
        working-directory: backend
        run: python manage.py test apps.core.tests_api_connection --verbosity 1

      - name: Frontend lint
        run: pnpm --dir web lint

      - name: Frontend typecheck
        run: pnpm --dir web exec tsc --noEmit

      - name: Frontend build
        run: pnpm --dir web build
